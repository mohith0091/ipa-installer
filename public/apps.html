<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <title>Uploaded Apps — IPA Installer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      <h1>IPA Installer</h1>
    </div>
    <p>Previously uploaded apps</p>
  </div>

  <div class="container">

    <!-- Loading state -->
    <div class="apps-loading" id="loadingState">
      <div class="spinner"></div>
      <p>Loading apps...</p>
    </div>

    <!-- Empty state -->
    <div class="apps-empty" id="emptyState" style="display: none;">
      <div class="empty-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </div>
      <h2>No Apps Uploaded Yet</h2>
      <p>Upload your first IPA file to get started.</p>
      <a href="/" class="btn btn-primary" style="display: inline-flex; text-decoration: none; margin-top: 16px;">Upload an App</a>
    </div>

    <!-- Error state -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Apps list -->
    <div class="apps-list" id="appsList" style="display: none;"></div>

    <div class="apps-actions" id="appsActions" style="display: none;">
      <a href="/" class="btn btn-primary" style="text-decoration: none;">Upload New App</a>
    </div>

  </div>

  <div class="footer">
    <p>IPA Installer — iOS OTA Distribution</p>
    <div class="footer-links">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      <a href="https://github.com/mohith0091/ipa-installer" target="_blank" rel="noopener noreferrer">View on GitHub</a>
    </div>
  </div>

  <script src="/js/apps.js"></script>
</body>
</html>
